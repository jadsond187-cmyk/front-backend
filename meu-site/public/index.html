<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>
</head>

<body>

<h1>Sistema de Cadastro</h1>

<form action="/cadastro" method="POST">

    <input
        type="text"
        name="nome"
        placeholder="Nome"
        required>

    <br><br>

    <input
        type="number"
        name="idade"
        placeholder="Idade"
        required>

    <br><br>

    <button type="submit">
        Cadastrar
    </button>

</form>

</body>
</html>
